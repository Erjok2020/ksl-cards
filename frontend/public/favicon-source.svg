<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background — rounded square, brand navy -->
  <rect width="512" height="512" rx="96" fill="#0C2D48"/>

  <!-- Simple open-hand icon built from rounded bars -->
  <!-- Four fingers -->
  <rect x="168" y="120" width="46" height="180" rx="23" fill="#F5C55A"/>
  <rect x="232" y="96"  width="46" height="204" rx="23" fill="#F5C55A"/>
  <rect x="296" y="96"  width="46" height="204" rx="23" fill="#F5C55A"/>
  <rect x="360" y="130" width="46" height="170" rx="23" fill="#F5C55A"/>

  <!-- Thumb -->
  <rect x="100" y="220" width="100" height="46" rx="23" fill="#F5C55A" transform="rotate(-28 100 220)"/>

  <!-- Palm -->
  <rect x="168" y="270" width="238" height="120" rx="40" fill="#F5C55A"/>

  <!-- Accent dot, brand green -->
  <circle cx="408" cy="104" r="20" fill="#1A6B4A"/>
</svg>
